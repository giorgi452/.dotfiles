import = [
    "~/.config/alacritty/themes/themes/iterm.toml"
]

live_config_reload = true
[env]
TERM = "xterm-256color"
[window]
opacity = 0.97
dynamic_padding = true
title="giorgi"
decorations="None"
# startup_mode="Fullscreen"
padding = {x = 5, y = 5}

[shell]
 program = "tmux"


[font]
size = 10.0
offset.y = 2

[font.bold]
family = "FiraCode Nerd Font"
style = "Heavy"

[font.bold_italic]
family = "FiraCode Nerd Font"
style = "Heavy Italic"

[font.italic]
family = "FiraCode Nerd Font"
style = "Medium Italic"

[font.normal]
family = "FiraCode Nerd Font"
style = "Medium"
